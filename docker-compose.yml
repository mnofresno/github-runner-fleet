services:
  runner-status:
    image: node:20-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STATUS_PORT: ${STATUS_INTERNAL_PORT:-8080}
      HEALTHCHECK_INTERVAL_MS: ${HEALTHCHECK_INTERVAL_MS:-15000}
      DATA_DIR: /app/data
    command: ["node", "/app/server.js"]
    ports:
      - "${STATUS_BIND:-127.0.0.1:3571}:${STATUS_INTERNAL_PORT:-8080}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./status-app:/app:ro
      - runner-fleet-data:/app/data

volumes:
  runner-fleet-data:
